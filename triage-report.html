<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OCMUI Backlog Triage Report</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0a0a0a;
  color: #e5e7eb;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  font-size: 14px;
  padding: 12px 1vw;
  width: 98vw;
}
h1 { font-size: 1.6em; margin-bottom: 4px; color: #fff; }
h2 { font-size: 1.3em; margin: 28px 0 8px 0; color: #93c5fd; border-bottom: 1px solid #333; padding-bottom: 4px; }
h3 { font-size: 1.1em; margin: 18px 0 6px 0; color: #a5b4fc; }
.meta { color: #9ca3af; font-size: 0.85em; margin-bottom: 16px; }
a { color: #60a5fa; text-decoration: none; }
a:hover { text-decoration: underline; }
.red { color: #ef4444; font-weight: 600; }
.orange { color: #f59e0b; font-weight: 600; }
.green { color: #22c55e; font-weight: 600; }
.purple { color: #a78bfa; font-weight: 600; }

.summary-cards {
  display: flex; gap: 16px; flex-wrap: wrap; margin: 16px 0 24px 0;
}
.card {
  background: #1f2937; border: 1px solid #333; border-radius: 8px;
  padding: 12px 18px; min-width: 120px; text-align: center;
}
.card .value { font-size: 1.6em; font-weight: 700; color: #fff; }
.card .label { font-size: 0.8em; color: #9ca3af; margin-top: 3px; }
.card-sm { padding: 8px 14px; min-width: 100px; }
.card-sm .value { font-size: 1.2em; }
.card-sm .label { font-size: 0.7em; }
.card-clickable { cursor: pointer; transition: border-color 0.15s, background 0.15s; }
.card-clickable:hover { border-color: #60a5fa; background: #1a2332; }
.orphan-parent-row { cursor: pointer; }
.orphan-parent-row:hover { background: #1a2332; }
.orphan-toggle { display: inline-block; transition: transform 0.2s; font-size: 0.7em; color: #9ca3af; margin-right: 6px; }
.orphan-parent-row.expanded .orphan-toggle { transform: rotate(90deg); }
.orphan-detail-row { display: none; }
.orphan-detail-row.visible { display: table-row; }
.orphan-detail-row td { padding: 4px 16px 12px; }
.orphan-child-table { width: 100%; border: 1px solid #333; border-radius: 4px; }
.orphan-child-table th { text-align: left; font-size: 0.8em; color: #9ca3af; padding: 4px 8px; border-bottom: 1px solid #333; }
.orphan-child-table td { padding: 4px 8px; font-size: 0.9em; }
.metrics-row { margin-top: 8px; }
.card-operator {
  display: flex; align-items: center; font-size: 1.6em; font-weight: 300;
  color: #6b7280; padding: 0 4px;
}

table { width: 100%; border-collapse: collapse; font-size: 13px; margin: 8px 0 16px 0; }
th, td { border: 1px solid #333; padding: 6px 10px; text-align: left; vertical-align: top; }
th {
  background: #1f2937; color: #d1d5db; font-weight: 600;
  position: relative; cursor: pointer; user-select: none; white-space: nowrap;
}
th:hover { background: #374151; }
th .sort-indicator { font-size: 10px; margin-left: 4px; opacity: 0.5; }
th.sorted .sort-indicator { opacity: 1; }
td { background: #111; }
tr:hover td { background: #1a1a2e; }
.nowrap { white-space: nowrap; }

th .resize-handle {
  position: absolute; right: 0; top: 0; bottom: 0; width: 5px;
  cursor: col-resize; background: transparent;
}
th .resize-handle:hover, th .resize-handle.active { background: #60a5fa; }

.filter-bar { margin: 8px 0; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.filter-bar input[type="text"] {
  background: #1a1a2e; border: 1px solid #333; color: #e5e7eb;
  padding: 6px 10px; border-radius: 4px; font-size: 13px; width: 280px;
}
.filter-bar input[type="text"]::placeholder { color: #6b7280; }
.filter-bar input[type="text"]:focus { outline: none; border-color: #60a5fa; }
.filter-bar select {
  background: #1a1a2e; border: 1px solid #333; color: #e5e7eb;
  padding: 6px 10px; border-radius: 4px; font-size: 13px;
}
.filter-bar select:focus { outline: none; border-color: #60a5fa; }

.badge {
  display: inline-block; padding: 2px 8px; border-radius: 3px;
  font-size: 11px; font-weight: 600; text-transform: uppercase;
}
.badge-blocker { background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.4); }
.badge-critical { background: rgba(249, 115, 22, 0.2); color: #f97316; border: 1px solid rgba(249, 115, 22, 0.4); }
.badge-major { background: rgba(245, 158, 11, 0.2); color: #f59e0b; border: 1px solid rgba(245, 158, 11, 0.4); }
.badge-normal { background: rgba(107, 114, 128, 0.2); color: #9ca3af; border: 1px solid rgba(107, 114, 128, 0.4); }
.badge-minor { background: rgba(75, 85, 99, 0.15); color: #6b7280; border: 1px solid rgba(75, 85, 99, 0.3); }

.tab-bar { display: flex; gap: 0; margin-bottom: 0; border-bottom: 2px solid #333; }
.tab {
  padding: 8px 18px; cursor: pointer; color: #9ca3af; font-weight: 500;
  border-bottom: 2px solid transparent; margin-bottom: -2px; font-size: 14px;
}
.tab:hover { color: #e5e7eb; }
.tab.active { color: #93c5fd; border-bottom-color: #93c5fd; }
.tab-content { display: none; }
.tab-content.active { display: block; }
.subtab-content { display: none; }
.subtab-content.active { display: block; }

.score-bar {
  display: inline-block; height: 8px; border-radius: 4px; vertical-align: middle;
}

.info-btn {
  display: inline-flex; align-items: center; justify-content: center;
  width: 16px; height: 16px; border-radius: 50%; font-size: 10px; font-weight: 700;
  background: rgba(96, 165, 250, 0.2); color: #60a5fa; border: 1px solid rgba(96, 165, 250, 0.4);
  cursor: pointer; margin-left: 4px; vertical-align: middle;
}
.info-btn:hover { background: rgba(96, 165, 250, 0.35); }

.info-popup {
  display: none; position: fixed; z-index: 1000;
  background: #1f2937; border: 1px solid #4b5563; border-radius: 8px;
  padding: 16px 20px; max-width: 420px; font-size: 12px; line-height: 1.6;
  color: #e5e7eb; box-shadow: 0 8px 24px rgba(0,0,0,0.5);
}
.info-popup.visible { display: block; }
.info-popup.info-popup-lg { max-width: 830px; max-height: 75vh; overflow-y: auto; }
.info-popup h4 { color: #93c5fd; margin-bottom: 8px; font-size: 13px; }
.info-popup h5 { color: #60a5fa; margin: 14px 0 6px; font-size: 12px; border-bottom: 1px solid #374151; padding-bottom: 4px; }
.info-popup table { margin: 8px 0; font-size: 11px; }
.jira-label {
  display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 11px; font-weight: 500;
  background: #e8e8e8; color: #333; font-family: -apple-system, sans-serif; vertical-align: middle;
  margin: 0 2px; white-space: nowrap;
}
.info-btn-lg {
  display: inline-flex; align-items: center; justify-content: center;
  width: 22px; height: 22px; border-radius: 50%; font-size: 13px; font-weight: 700;
  background: rgba(96, 165, 250, 0.2); color: #60a5fa; border: 1px solid rgba(96, 165, 250, 0.4);
  cursor: pointer; margin-left: 10px; vertical-align: middle;
}
.info-btn-lg:hover { background: rgba(96, 165, 250, 0.35); }
.info-popup th, .info-popup td { padding: 3px 8px; border-color: #374151; }
.info-popup .close-btn {
  position: absolute; top: 8px; right: 12px; cursor: pointer;
  color: #6b7280; font-size: 16px;
}
.info-popup .close-btn:hover { color: #e5e7eb; }

/* Close mode */
.close-col { display: none; }
body.close-mode .close-col { display: table-cell; }
.close-col input[type="checkbox"] { cursor: pointer; width: 16px; height: 16px; accent-color: #ef4444; }
.close-footer {
  display: none; position: fixed; bottom: 0; left: 0; right: 0; z-index: 900;
  background: #1f2937; border-top: 2px solid #ef4444; padding: 10px 24px;
  align-items: center; justify-content: space-between; gap: 16px;
}
body.close-mode .close-footer.has-selection { display: flex; }
.close-footer .close-count { color: #e5e7eb; font-weight: 600; }
.close-footer .close-btn-action {
  background: #ef4444; color: #fff; border: none; border-radius: 6px;
  padding: 8px 20px; font-size: 14px; font-weight: 600; cursor: pointer;
}
.close-footer .close-btn-action:hover { background: #dc2626; }
.close-modal-overlay {
  display: none; position: fixed; inset: 0; z-index: 1100;
  background: rgba(0,0,0,0.7); align-items: center; justify-content: center;
}
.close-modal-overlay.visible { display: flex; }
.close-modal {
  background: #1f2937; border: 1px solid #4b5563; border-radius: 10px;
  padding: 24px 28px; max-width: 600px; width: 90vw; max-height: 70vh;
  overflow-y: auto; color: #e5e7eb;
}
.close-modal h3 { margin-bottom: 12px; color: #ef4444; }
.close-modal .close-modal-list { margin: 12px 0; font-size: 13px; }
.close-modal .close-modal-list li { margin: 4px 0; }
.close-modal .close-modal-actions { display: flex; gap: 12px; margin-top: 16px; justify-content: flex-end; }
.close-modal .modal-cancel {
  background: #374151; color: #e5e7eb; border: none; border-radius: 6px;
  padding: 8px 18px; font-size: 14px; cursor: pointer;
}
.close-modal .modal-cancel:hover { background: #4b5563; }
.close-modal .modal-confirm {
  background: #ef4444; color: #fff; border: none; border-radius: 6px;
  padding: 8px 18px; font-size: 14px; font-weight: 600; cursor: pointer;
}
.close-modal .modal-confirm:hover { background: #dc2626; }

/* Priority mode (hidden until triple-click on Priority Scoring tab) */
.priority-col { display: none; }
body.priority-mode .priority-col { display: table-cell; }
.priority-col input[type="checkbox"] { cursor: pointer; width: 16px; height: 16px; accent-color: #60a5fa; }
.priority-footer {
  display: none; position: fixed; bottom: 0; left: 0; right: 0; z-index: 900;
  background: #1f2937; border-top: 2px solid #60a5fa; padding: 10px 24px;
  align-items: center; justify-content: space-between; gap: 16px;
}
body.priority-mode .priority-footer.has-selection { display: flex; }
.priority-footer .priority-count { color: #e5e7eb; font-weight: 600; }
.priority-footer .priority-btn-action {
  background: #60a5fa; color: #000; border: none; border-radius: 6px;
  padding: 8px 20px; font-size: 14px; font-weight: 600; cursor: pointer;
}
.priority-footer .priority-btn-action:hover { background: #3b82f6; }

/* Priority revert mode (hidden until triple-click on Accepted box) */
.priority-revert-col { display: none; }
body.priority-revert-mode .priority-revert-col { display: table-cell; }
.priority-revert-col input[type="checkbox"] { cursor: pointer; width: 16px; height: 16px; accent-color: #f59e0b; }
.priority-revert-footer {
  display: none; position: fixed; bottom: 0; left: 0; right: 0; z-index: 900;
  background: #1f2937; border-top: 2px solid #f59e0b; padding: 10px 24px;
  align-items: center; justify-content: space-between; gap: 16px;
}
body.priority-revert-mode .priority-revert-footer.has-selection { display: flex; }
.priority-revert-footer .priority-revert-count { color: #e5e7eb; font-weight: 600; }
.priority-revert-footer .priority-revert-btn-action {
  background: #f59e0b; color: #000; border: none; border-radius: 6px;
  padding: 8px 20px; font-size: 14px; font-weight: 600; cursor: pointer;
}
.priority-revert-footer .priority-revert-btn-action:hover { background: #d97706; }

/* Freeze/Unfreeze mode (hidden until triple-click on Stale/Frozen sub-tabs) */
.freeze-col { display: none; }
.unfreeze-col { display: none; }
body.freeze-mode .freeze-col { display: table-cell; }
body.unfreeze-mode .unfreeze-col { display: table-cell; }
.freeze-col input[type="checkbox"] { cursor: pointer; width: 16px; height: 16px; accent-color: #22d3ee; }
.unfreeze-col input[type="checkbox"] { cursor: pointer; width: 16px; height: 16px; accent-color: #f59e0b; }
.freeze-footer {
  display: none; position: fixed; bottom: 0; left: 0; right: 0; z-index: 900;
  background: #1f2937; border-top: 2px solid #22d3ee; padding: 10px 24px;
  align-items: center; justify-content: space-between; gap: 16px;
}
body.freeze-mode .freeze-footer.has-selection { display: flex; }
body.unfreeze-mode .freeze-footer.has-selection { display: flex; }
.freeze-footer .freeze-count { color: #e5e7eb; font-weight: 600; }
.freeze-footer .freeze-btn-action {
  background: #22d3ee; color: #000; border: none; border-radius: 6px;
  padding: 8px 20px; font-size: 14px; font-weight: 600; cursor: pointer;
}
.freeze-footer .freeze-btn-action:hover { background: #06b6d4; }

/* Revert mode */
.revert-col { display: none; }
body.revert-mode .revert-col { display: table-cell; }
.revert-col input[type="checkbox"] { cursor: pointer; width: 16px; height: 16px; accent-color: #f59e0b; }
.revert-footer {
  display: none; position: fixed; bottom: 0; left: 0; right: 0; z-index: 900;
  background: #1f2937; border-top: 2px solid #f59e0b; padding: 10px 24px;
  align-items: center; justify-content: space-between; gap: 16px;
}
body.revert-mode .revert-footer.has-selection { display: flex; }
.revert-footer .revert-count { color: #e5e7eb; font-weight: 600; }
.revert-footer .revert-btn-action {
  background: #f59e0b; color: #000; border: none; border-radius: 6px;
  padding: 8px 20px; font-size: 14px; font-weight: 600; cursor: pointer;
}
.revert-footer .revert-btn-action:hover { background: #d97706; }
.clear-btn {
  background: #374151; color: #9ca3af; border: 1px solid #4b5563; border-radius: 6px;
  padding: 6px 14px; font-size: 13px; cursor: pointer;
}
.clear-btn:hover { background: #4b5563; color: #e5e7eb; }
</style>
</head>
<body>
<div id="app"></div>
<div class="close-footer" id="close-footer">
  <span class="close-count">0 tickets selected</span>
  <div><button class="clear-btn" onclick="clearSelection('.close-cb',updateCloseFooter)">Clear Selected</button> <button class="close-btn-action" onclick="showCloseModal()">Close Selected</button></div>
</div>
<div class="close-modal-overlay" id="close-modal-overlay">
  <div class="close-modal"></div>
</div>
<div class="revert-footer" id="revert-footer">
  <span class="revert-count">0 tickets selected</span>
  <div><button class="clear-btn" onclick="clearSelection('.revert-cb',updateRevertFooter)">Clear Selected</button> <button class="revert-btn-action" onclick="showRevertModal()">Revert Selected</button></div>
</div>
<div class="close-modal-overlay" id="revert-modal-overlay">
  <div class="close-modal"></div>
</div>
<div class="priority-footer" id="priority-footer">
  <span class="priority-count">0 tickets selected</span>
  <div><button class="clear-btn" onclick="clearSelection('.priority-cb',updatePriorityFooter)">Clear Selected</button> <button class="priority-btn-action" onclick="showPriorityModal()">Set Priority</button></div>
</div>
<div class="close-modal-overlay" id="priority-modal-overlay">
  <div class="close-modal"></div>
</div>
<div class="priority-revert-footer" id="priority-revert-footer">
  <span class="priority-revert-count">0 tickets selected</span>
  <div><button class="clear-btn" onclick="clearSelection('.priority-revert-cb',updatePriorityRevertFooter)">Clear Selected</button> <button class="priority-revert-btn-action" onclick="showPriorityRevertModal()">Revert Priority</button></div>
</div>
<div class="close-modal-overlay" id="priority-revert-modal-overlay">
  <div class="close-modal"></div>
</div>
<div class="freeze-footer" id="freeze-footer">
  <span class="freeze-count">0 tickets selected</span>
  <div><button class="clear-btn" onclick="clearSelection('.freeze-cb,.unfreeze-cb',updateFreezeFooter)">Clear Selected</button> <button class="freeze-btn-action" id="freeze-btn" onclick="showFreezeModal()">Freeze Selected</button></div>
</div>
<div class="close-modal-overlay" id="freeze-modal-overlay">
  <div class="close-modal"></div>
</div>
<script src="triage-data.js"></script>
<script>
const D = window.TRIAGE_DATA;
const JIRA = 'https://redhat.atlassian.net/browse/';

function clearSelection(selector, updateFn) {
  document.querySelectorAll(selector).forEach(cb => { cb.checked = false; });
  if (updateFn) updateFn();
}

function jiraLink(key) { return `<a href="${JIRA}${key}" target="_blank">${key}</a>`; }
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function scoreColor(score) {
  if (score >= 80) return '#ef4444';
  if (score >= 60) return '#f97316';
  if (score >= 40) return '#f59e0b';
  if (score >= 20) return '#9ca3af';
  return '#4b5563';
}


function priorityBadge(label) {
  const name = label.replace('suggested-priority-', '');
  return `<span class="badge badge-${name}">${name}</span>`;
}

function render() {
  const app = document.getElementById('app');
  let html = '';

  html += `<h1>OCMUI Backlog Triage Report <span class="info-btn-lg" data-info="main-overview">?</span></h1>`;
  html += `<div class="meta">Generated: ${new Date(D.meta.generated_at).toLocaleString()}</div>`;


  // Ticket counts matching Jira board layout
  const allTickets = D.tickets || [];
  const staleTickets = D.stale_tickets || [];
  const frozenTickets = D.frozen_tickets || [];
  const staleCount = staleTickets.length;
  const frozenCount = frozenTickets.length;
  const epicCount = allTickets.filter(t => t.type === 'Epic').length;
  const sprintNonEpic = allTickets.filter(t => t.sprint && t.type !== 'Epic').length;
  const backlogNonEpic = allTickets.filter(t => !t.sprint && t.type !== 'Epic').length + staleCount + frozenCount;
  const totalAll = sprintNonEpic + backlogNonEpic + epicCount;
  html += `<div class="summary-cards">`;
  html += `<div class="card"><div class="value">${backlogNonEpic}</div><div class="label">Backlog</div></div>`;
  html += `<span class="card-operator">+</span>`;
  html += `<div class="card"><div class="value">${sprintNonEpic}</div><div class="label">Sprint</div></div>`;
  html += `<span class="card-operator">+</span>`;
  html += `<div class="card"><div class="value">${epicCount}</div><div class="label">Epics</div></div>`;
  html += `<span class="card-operator">=</span>`;
  html += `<div class="card" style="border-color:#60a5fa;"><div class="value">${totalAll}</div><div class="label">Total</div></div>`;
  html += `</div>`;

  // Tabs (with counts)
  const dupGroups = findDuplicateGeneratedTickets();
  const dupTicketCount = dupGroups.reduce((sum, g) => sum + g.tickets.length, 0);
  const orphanedCount = D.tickets.filter(t => t.parent_status === 'Closed' || t.parent_status === 'Done').length;

  html += `<div class="tab-bar">`;
  html += `<div class="tab active" data-tab="priorities">Priority Scoring</div>`;
  html += `<div class="tab" data-tab="lifecycle">Lifecycle</div>`;
  html += `<div class="tab" data-tab="duplicates">Possible Duplicates (${dupTicketCount})</div>`;
  html += `<div class="tab" data-tab="cleanup">Orphaned Issues (${orphanedCount})</div>`;
  const triageClosed = (D.close_log || []).length;
  html += `<div class="tab" data-tab="history">Close History (<span style="color:#22c55e;">&#8595;</span> ${triageClosed})</div>`;
  html += `</div>`;

  html += renderPrioritiesTab();
  html += renderDuplicatesTab();
  html += renderCleanupTab();
  html += renderLifecycleTab();
  html += renderHistoryTab();

  app.innerHTML = html;
  initTabs();
  initAllTables();
}

function renderPrioritiesTab() {
  if (!D.priorities) return `<div class="tab-content active" id="tab-priorities"><p>Priority scoring not yet run.</p></div>`;

  const scored = D.priorities.scored_tickets;
  const dist = D.priorities.label_distribution;

  let html = `<div class="tab-content active" id="tab-priorities">`;

  // Count of accepted priority suggestions
  const allTickets = [...(D.tickets || []), ...(D.stale_tickets || []), ...(D.frozen_tickets || [])];
  const acceptedCount = allTickets.filter(t => (t.labels || []).some(l => l.startsWith('triage-original-priority-'))).length;

  // Distribution summary
  html += `<h3>Suggested Priority Distribution</h3>`;
  html += `<div style="display:flex;gap:12px;margin:8px 0 16px;align-items:flex-end;">`;
  const order = ['suggested-priority-blocker','suggested-priority-critical','suggested-priority-major','suggested-priority-normal','suggested-priority-minor'];
  order.forEach(label => {
    const count = dist[label] || 0;
    const name = label.replace('suggested-priority-','');
    html += `<div style="text-align:center;">${priorityBadge(label)}<div style="font-size:18px;font-weight:700;margin-top:4px;">${count}</div></div>`;
  });
  html += `<div id="accepted-priority-box" style="margin-left:24px;text-align:center;padding:8px 16px;background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);border-radius:8px;cursor:pointer;"><div style="font-size:18px;font-weight:700;color:#22c55e;">${acceptedCount}</div><div style="font-size:11px;color:#9ca3af;margin-top:2px;">Suggested Priorities Accepted</div></div>`;
  html += `</div>`;

  // Filter
  html += `<div class="filter-bar">`;
  html += `<input type="text" id="priority-filter" placeholder="Filter by key or summary..." oninput="filterTable('priorities-table','priority-filter')">`;
  html += `<select id="priority-type-filter" onchange="filterTable('priorities-table','priority-filter')"><option value="">All Types</option><option value="Bug">Bug</option><option value="Story">Story</option><option value="Epic">Epic</option><option value="Task">Task</option></select>`;
  html += `<select id="priority-label-filter" onchange="filterTable('priorities-table','priority-filter')"><option value="">All Suggested</option>`;
  order.forEach(l => { html += `<option value="${l}">${l.replace('suggested-priority-','')}</option>`; });
  html += `</select>`;
  html += `</div>`;

  // Table
  html += `<table id="priorities-table"><thead><tr>`;
  html += `<th class="priority-col" style="font-size:12px;">Set Priority to<br>Suggested?</th>`;
  html += `<th class="priority-revert-col" style="font-size:12px;">Revert Suggested Priority?</th>`;
  const priorityHeaders = [
    {name: 'Type'},
    {name: 'Key'},
    {name: 'Summary'},
    {name: 'Current'},
    {name: 'Priority Score', info: 'score-info'},
    {name: 'Suggested', info: 'suggested-info'},
    {name: 'Reporter'},
    {name: 'Comments'},
    {name: 'Last Updated'},
    {name: 'Created'},
  ];
  priorityHeaders.forEach((h, idx) => {
    const infoBtn = h.info ? `<span class="info-btn" data-info="${h.info}">?</span>` : '';
    html += `<th>${h.name}${infoBtn}<span class="sort-indicator">\u21C5</span><div class="resize-handle"></div></th>`;
    if (h.name === 'Suggested') {
      html += `<th class="priority-revert-col">Restore<div class="resize-handle"></div></th>`;
    }
  });
  html += `</tr></thead><tbody>`;

  const PRIORITY_IDS = { blocker: '10000', critical: '10001', major: '10002', normal: '10003', minor: '10004' };
  const ticketLabelMap = {};
  allTickets.forEach(t => { ticketLabelMap[t.key] = t.labels || []; });
  scored.forEach(s => {
    const color = scoreColor(s.score);
    const barWidth = Math.min(s.score, 100);
    const suggestedName = s.suggested_label.replace('suggested-priority-', '');
    const currentLower = (s.current_priority || '').toLowerCase();
    const differs = currentLower !== suggestedName;
    const priorityId = PRIORITY_IDS[suggestedName] || '';
    const labels = ticketLabelMap[s.key] || [];
    const origLabel = labels.find(l => l.startsWith('triage-original-priority-'));
    const hasAccepted = !!origLabel;
    html += `<tr data-type="${esc(s.type)}" data-label="${esc(s.suggested_label)}" data-accepted="${hasAccepted ? 'yes' : 'no'}">`;
    if (differs) {
      html += `<td class="priority-col"><input type="checkbox" class="priority-cb" data-key="${esc(s.key)}" data-priority-id="${priorityId}" data-priority-name="${suggestedName}" data-original-priority="${currentLower}" data-summary="${esc(s.summary)}" onchange="updatePriorityFooter()"></td>`;
    } else {
      html += `<td class="priority-col"></td>`;
    }
    if (hasAccepted) {
      const origPriority = origLabel.replace('triage-original-priority-', '');
      html += `<td class="priority-revert-col"><input type="checkbox" class="priority-revert-cb" data-key="${esc(s.key)}" data-summary="${esc(s.summary)}" data-original="${origPriority}" onchange="updatePriorityRevertFooter()"></td>`;
    } else {
      html += `<td class="priority-revert-col"></td>`;
    }
    html += `<td>${esc(s.type)}</td>`;
    html += `<td class="nowrap">${jiraLink(s.key)}</td>`;
    html += `<td>${esc(s.summary)}</td>`;
    html += `<td>${esc(s.current_priority)}</td>`;
    html += `<td class="nowrap"><span class="score-bar" style="width:${barWidth}px;background:${color};"></span> ${s.score}</td>`;
    html += `<td>${priorityBadge(s.suggested_label)}</td>`;
    if (hasAccepted) {
      const origPriorityDisplay = origLabel.replace('triage-original-priority-', '');
      html += `<td class="priority-revert-col"><span class="badge badge-${origPriorityDisplay}">${origPriorityDisplay}</span></td>`;
    } else {
      html += `<td class="priority-revert-col"></td>`;
    }
    html += `<td>${esc(s.reporter_email.split('@')[0] || s.reporter_name || '')}</td>`;
    html += `<td>${s.comment_count}</td>`;
    html += `<td class="nowrap">${(s.updated || '').slice(0, 10)}</td>`;
    html += `<td class="nowrap">${(s.created || '').slice(0, 10)}</td>`;
    html += `</tr>`;
  });

  html += `</tbody></table></div>`;
  return html;
}


const GENERATED_PREFIX_PATTERNS = [
  'create feature flag',
  'enable feature flag',
  'remove feature flag',
  'e2e automation',
  'ci automation',
  'post-merge testing',
  'refinement task for',
];

const AUTOMATION_REPORTERS = ['automation for jira'];

function isGeneratedTicket(summary, reporterEmail, reporterName) {
  const lower = (summary || '').toLowerCase();
  const stripped = lower.replace(/^\[/, '');
  if (GENERATED_PREFIX_PATTERNS.some(p => lower.startsWith(p) || stripped.startsWith(p))) return true;
  const rName = (reporterName || '').toLowerCase();
  if (AUTOMATION_REPORTERS.some(a => rName.includes(a))) return true;
  return false;
}

function getGeneratedPrefix(summary) {
  const lower = (summary || '').toLowerCase();
  for (const p of GENERATED_PREFIX_PATTERNS) {
    if (lower.startsWith(p)) return p;
  }
  return null;
}

function isRealGeneratedDuplicate(pairA, pairB) {
  const prefixA = getGeneratedPrefix(pairA);
  const prefixB = getGeneratedPrefix(pairB);
  // Only a real dup if both have the SAME prefix type
  return prefixA && prefixB && prefixA === prefixB;
}

// Parents known to have many similarly-named automated tasks by design (not duplicates)
const DUP_PARENT_WHITELIST = ['OCMUI-1534', 'OCMUI-3051'];

function findDuplicateGeneratedTickets() {
  // Direct approach: group ALL tickets by parent_key + prefix type.
  // If any group has 2+ tickets, those are duplicates (automation ran twice).
  const allTickets = [...(D.tickets || []), ...(D.stale_tickets || []), ...(D.frozen_tickets || [])];
  const groups = {};

  allTickets.forEach(t => {
    if (!t.parent_key) return;
    if (DUP_PARENT_WHITELIST.includes(t.parent_key)) return;
    const prefix = getGeneratedPrefix(t.summary);
    if (!prefix) return;
    const groupKey = `${t.parent_key}::${prefix}`;
    if (!groups[groupKey]) groups[groupKey] = [];
    groups[groupKey].push(t);
  });

  // Only keep groups with 2+ tickets (actual duplicates)
  const dupGroups = Object.entries(groups)
    .filter(([, tickets]) => tickets.length >= 2)
    .map(([key, tickets]) => {
      const [parentKey, prefix] = key.split('::');
      return { parentKey, prefix, tickets };
    })
    .sort((a, b) => a.parentKey.localeCompare(b.parentKey) || a.prefix.localeCompare(b.prefix));

  return dupGroups;
}

function renderDuplicatesTab() {
  const dupGroups = findDuplicateGeneratedTickets();
  const totalDupTickets = dupGroups.reduce((sum, g) => sum + g.tickets.length, 0);
  const affectedParents = [...new Set(dupGroups.map(g => g.parentKey))];

  // Group all duplicate groups by parent
  const byParent = {};
  dupGroups.forEach(g => {
    if (!byParent[g.parentKey]) byParent[g.parentKey] = [];
    byParent[g.parentKey].push(...g.tickets);
  });

  let html = `<div class="tab-content" id="tab-duplicates">`;
  html += `<h3>Possible Duplicates</h3>`;
  html += `<div style="margin:8px 0 12px;color:#9ca3af;">${affectedParents.length} parent epics with duplicated automation tasks (${totalDupTickets} tickets total) — automation likely ran multiple times on these epics.</div>`;

  html += `<div class="filter-bar">`;
  html += `<input type="text" id="dup-filter" placeholder="Filter by key, summary, or parent..." oninput="filterTable('dup-table','dup-filter')">`;
  html += `</div>`;

  // Build a lookup for parent summaries
  const allTickets = [...(D.tickets || []), ...(D.stale_tickets || []), ...(D.frozen_tickets || [])];
  const ticketLookup = {};
  allTickets.forEach(t => { ticketLookup[t.key] = t; });

  html += `<table id="dup-table"><thead><tr>`;
  ['Parent','Parent Summary','Possible Duplicated Children'].forEach(h => {
    html += `<th>${h}<span class="sort-indicator">\u21C5</span><div class="resize-handle"></div></th>`;
  });
  html += `</tr></thead><tbody>`;

  // Sort parents by key
  const sortedParents = Object.keys(byParent).sort();
  sortedParents.forEach(parentKey => {
    const parentTicket = ticketLookup[parentKey];
    const parentSummary = parentTicket ? esc(parentTicket.summary) : `<span style="color:#6b7280">(not in fetched data)</span>`;
    // Sort children by Jira key (numeric part)
    const children = byParent[parentKey].sort((a, b) => {
      const numA = parseInt(a.key.split('-')[1]) || 0;
      const numB = parseInt(b.key.split('-')[1]) || 0;
      return numA - numB;
    });
    const childrenList = children.map(t =>
      `<span class="close-col" style="display:none;"><input type="checkbox" class="close-cb" data-key="${esc(t.key)}" data-summary="${esc(t.summary)}" data-parent="${esc(parentKey)}" onchange="updateCloseFooter()"> </span>${jiraLink(t.key)} - ${esc(t.summary)}`
    ).join('<br>');
    html += `<tr>`;
    html += `<td class="nowrap">${jiraLink(parentKey)}</td>`;
    html += `<td>${parentSummary}</td>`;
    html += `<td>${childrenList}</td>`;
    html += `</tr>`;
  });

  html += `</tbody></table></div>`;
  return html;
}

function renderCleanupTab() {
  const tickets = D.tickets || [];
  const closedParent = tickets.filter(t => t.parent_status === 'Closed' || t.parent_status === 'Done');

  // Group by parent
  const byParent = {};
  closedParent.forEach(t => {
    const pk = t.parent_key || '(none)';
    if (!byParent[pk]) byParent[pk] = { status: t.parent_status, summary: t.parent_summary || '', type: t.parent_type || '', assignee: t.parent_assignee || '', priority: t.parent_priority || '', children: [] };
    byParent[pk].children.push(t);
    if (!byParent[pk].summary && t.parent_summary) byParent[pk].summary = t.parent_summary;
    if (!byParent[pk].type && t.parent_type) byParent[pk].type = t.parent_type;
    if (!byParent[pk].assignee && t.parent_assignee) byParent[pk].assignee = t.parent_assignee;
    if (!byParent[pk].priority && t.parent_priority) byParent[pk].priority = t.parent_priority;
  });

  // Sort children within each parent by Jira ID
  Object.values(byParent).forEach(g => {
    g.children.sort((a, b) => {
      const numA = parseInt(a.key.split('-')[1]) || 0;
      const numB = parseInt(b.key.split('-')[1]) || 0;
      return numA - numB;
    });
  });

  // Sort parents by child count (desc) then key
  const parentKeys = Object.keys(byParent).sort((a, b) => {
    const diff = byParent[b].children.length - byParent[a].children.length;

  // Get parent closed date from first child's parent_resolutiondate (fetched from API)
  Object.values(byParent).forEach(g => {

  let html = `<div class="tab-content" id="tab-cleanup">`;

  html += `<div style="margin:8px 0 12px;color:#9ca3af;">Epics/Stories/Tasks whose parent is already Closed — likely leftover work. Click a row to expand/collapse children.</div>`;

  html += `<table id="cleanup-table"><thead><tr>`;
  html += `<th class="close-col" style="width:30px;"></th>`;
  ['Parent','Type','Summary','Assignee','Priority','Status','# Open Children','Closed'].forEach(h => {
    html += `<th>${h}<span class="sort-indicator">\u21C5</span><div class="resize-handle"></div></th>`;
  });
  html += `</tr></thead><tbody>`;

  parentKeys.forEach(pk => {
    const group = byParent[pk];
    const parentSummary = group.summary ? esc(group.summary) : '';
    const childRows = group.children.map(t =>
      `<tr><td class="close-col"><input type="checkbox" class="close-cb" data-key="${esc(t.key)}" onchange="syncOrphanParent(this)"></td><td class="nowrap">${jiraLink(t.key)}</td><td>${esc(t.summary)}</td><td>${esc(t.assignee || '')}</td><td>${esc(t.type)}</td><td>${esc(t.status)}</td></tr>`
    ).join('');

    html += `<tr class="orphan-parent-row" onclick="this.classList.toggle('expanded');this.nextElementSibling.classList.toggle('visible');">`;
    html += `<td class="close-col" onclick="event.stopPropagation();"><input type="checkbox" class="close-parent-cb" onchange="toggleOrphanChildren(this)"></td>`;
    html += `<td class="nowrap"><span class="orphan-toggle">&#9654;</span> ${jiraLink(pk)}</td>`;
    html += `<td>${esc(group.type)}</td>`;
    html += `<td>${parentSummary}</td>`;
    html += `<td>${esc(group.assignee)}</td>`;
    html += `<td>${esc(group.priority)}</td>`;
    html += `<td style="color:#ef4444;">${esc(group.status)}</td>`;
    html += `<td style="color:#ef4444;font-weight:600;">${group.children.length}</td>`;
    html += `<td class="nowrap">${group.closedDate}</td>`;
    html += `</tr>`;
    html += `<tr class="orphan-detail-row"><td colspan="9"><table class="orphan-child-table"><thead><tr><th class="close-col" style="width:30px;"></th><th>Key</th><th>Summary</th><th>Assignee</th><th>Type</th><th>Status</th></tr></thead><tbody>${childRows}</tbody></table></td></tr>`;
  });

  return html;
}

function estimateCloseDate(updatedStr) {
  if (!updatedStr) return null;
  const updated = new Date(updatedStr);
  if (isNaN(updated)) return null;
  const closeDate = new Date(updated);
  closeDate.setDate(closeDate.getDate() + 90);
  return closeDate;
}

function closeDateDisplay(updatedStr) {
  const closeDate = estimateCloseDate(updatedStr);
  if (!closeDate) return '';
  const now = new Date();
  const daysLeft = Math.ceil((closeDate - now) / (1000 * 60 * 60 * 24));
  const dateStr = closeDate.toISOString().slice(0, 10);
  let color = '#9ca3af';
  if (daysLeft <= 7) color = '#ef4444';
  else if (daysLeft <= 20) color = '#f59e0b';
  const label = daysLeft <= 0 ? 'overdue' : `${daysLeft}d`;
  return `<span style="color:${color};font-weight:600;">${dateStr}</span> <span style="color:${color};font-size:0.8em;">(${label})</span>`;
}

function renderLifecycleTable(tableId, tickets, {showEstClose = true, hideGenerated = false, showFreeze = false, showUnfreeze = false} = {}) {
  let html = `<table id="${tableId}"><thead><tr>`;
  if (showFreeze) html += `<th class="freeze-col" style="font-size:12px;">Freeze?</th>`;
  if (showUnfreeze) html += `<th class="unfreeze-col" style="font-size:12px;">Unfreeze?</th>`;
  const lcHeaders = [
    {name: 'Type'}, {name: 'Key'}, {name: 'Summary'}, {name: 'Status'},
    {name: 'Priority'}, {name: 'Reporter'}, {name: 'Created'}, {name: 'Last Updated'},
  ];
  if (showEstClose) lcHeaders.push({name: 'Est. Close', info: 'est-close-info'});
  lcHeaders.push({name: 'Parent'});
  lcHeaders.forEach(h => {
    const infoBtn = h.info ? `<span class="info-btn" data-info="${h.info}">?</span>` : '';
    html += `<th>${h.name}${infoBtn}<span class="sort-indicator">\u21C5</span><div class="resize-handle"></div></th>`;
  });
  html += `</tr></thead><tbody>`;

  tickets.forEach(t => {
    const generated = isGeneratedTicket(t.summary, t.reporter_email, t.reporter_name);
    const hidden = hideGenerated && generated;
    html += `<tr data-generated="${generated ? 'yes' : 'no'}" ${hidden ? 'style="display:none;"' : ''}>`;
    if (showFreeze) {
      html += `<td class="freeze-col"><input type="checkbox" class="freeze-cb" data-key="${esc(t.key)}" data-summary="${esc(t.summary)}" onchange="updateFreezeFooter()"></td>`;

    if (showUnfreeze) {
      html += `<td class="unfreeze-col"><input type="checkbox" class="unfreeze-cb" data-key="${esc(t.key)}" data-summary="${esc(t.summary)}" onchange="updateFreezeFooter()"></td>`;
    }
    html += `<td>${esc(t.type)}</td>`;
    html += `<td class="nowrap">${jiraLink(t.key)}</td>`;
    html += `<td>${esc(t.summary)}</td>`;
    html += `<td>${esc(t.status)}</td>`;
    html += `<td>${esc(t.priority)}</td>`;
    html += `<td>${esc((t.reporter_email || '').split('@')[0] || t.reporter_name || '')}</td>`;
    html += `<td class="nowrap">${(t.created || '').slice(0, 10)}</td>`;
    html += `<td class="nowrap">${(t.updated || '').slice(0, 10)}</td>`;
    if (showEstClose) html += `<td class="nowrap">${closeDateDisplay(t.updated)}</td>`;
    html += `<td class="nowrap">${t.parent_key ? jiraLink(t.parent_key) : ''}</td>`;
    html += `</tr>`;
  });

  html += `</tbody></table>`;
  return html;
}

function renderHistoryTab() {

  let html = `<div class="tab-content" id="tab-history">`;

  // --- Summary equation (always shown at top) ---
  const startingTotal = 929; // Baseline: 2026-06-26
  const currentTotal = (D.tickets || []).length + (D.stale_tickets || []).length + (D.frozen_tickets || []).length;

  const byLabel = {};
  closeLog.forEach(r => { byLabel[r.label] = (byLabel[r.label] || 0) + 1; });

  const dupClosed = byLabel['triage-closed-duplicate'] || 0;
  const obsClosed = byLabel['triage-closed-obsolete'] || 0;
  const triageClosed = orphanClosed + dupClosed + obsClosed; // obsClosed kept for historical data

  // Split non-triage closures into Lifecycle (Bot) vs Lifecycle vs Other using recently_closed data
  const lifecycleBotClosed = recentlyClosed.filter(t => t.close_category === 'Lifecycle (Bot)' && (t.updated || '').slice(0,10) >= '2026-06-26').length;
  const lifecycleClosed = recentlyClosed.filter(t => t.close_category === 'Lifecycle' && (t.updated || '').slice(0,10) >= '2026-06-26').length;
  const totalNonTriage = startingTotal - triageClosed - currentTotal;
  const otherClosed = Math.max(0, totalNonTriage - lifecycleBotClosed - lifecycleClosed);

  html += `<h3>Closed Issues</h3>`;
  html += `<div style="display:flex;gap:12px;margin:12px 0 20px;flex-wrap:wrap;align-items:center;">`;
  html += `<div class="card card-sm"><div class="value">${startingTotal}</div><div class="label">Started At (6/26)</div></div>`;
  html += `<span class="card-operator">−</span>`;
  html += `<div class="card card-sm"><div class="value" style="color:#f59e0b;">${orphanClosed}</div><div class="label">Orphan</div></div>`;
  html += `<span class="card-operator">−</span>`;
  html += `<div class="card card-sm"><div class="value" style="color:#a78bfa;">${dupClosed}</div><div class="label">Duplicate</div></div>`;

  html += `<div class="card card-sm"><div class="value" style="color:#64748b;">${otherClosed}</div><div class="label">Other</div></div>`;

  html += `<div class="card card-sm" style="border-color:#22c55e;"><div class="value">${currentTotal}</div><div class="label">Current Total</div></div>`;

  html += `<div class="tab" data-subtab="history-all">Closed within last 3 months (${recentlyClosed.length})</div>`;
  html += `</div>`;

  // === Triage sub-tab ===
  html += `<div class="subtab-content active" id="subtab-history-triage">`;

  if (!closeLog.length) {

        if (dupW) html += `<div style="width:${dupW}px;background:#a78bfa;" title="Duplicate: ${w.duplicate}"></div>`;
        html += `</div>`;
        html += `<span style="font-size:12px;color:#e5e7eb;font-weight:600;">${w.total}</span>`;
        html += `</div>`;
      });
      html += `</div>`;

      // Legend
      html += `<div style="display:flex;gap:16px;margin:8px 0 20px;font-size:12px;">`;
      html += `<span><span style="display:inline-block;width:12px;height:12px;background:#f59e0b;border-radius:2px;vertical-align:middle;margin-right:4px;"></span>Orphaned</span>`;
      html += `<span><span style="display:inline-block;width:12px;height:12px;background:#a78bfa;border-radius:2px;vertical-align:middle;margin-right:4px;"></span>Duplicate</span>`;
      html += `</div>`;
    }

    // Closure detail table
    html += `<h3 style="margin-top:24px;">Closure Log</h3>`;
    html += `<table id="history-table"><thead><tr>`;
    html += `<th class="revert-col" style="width:auto;font-size:12px;">Revert Triage?</th>`;
    ['Date','Key','Summary','Resolution','Label','Reason'].forEach(h => {
      html += `<th>${h}<span class="sort-indicator">\u21C5</span><div class="resize-handle"></div></th>`;
    });
    html += `</tr></thead><tbody>`;
    closeLog.slice().reverse().forEach(r => {
      html += `<tr>`;
      html += `<td class="revert-col"><input type="checkbox" class="revert-cb" data-key="${esc(r.key)}" data-summary="${esc(r.summary || '')}" onchange="updateRevertFooter()"></td>`;
      html += `<td class="nowrap">${esc(r.date)}</td>`;
      html += `<td class="nowrap">${jiraLink(r.key)}</td>`;
      html += `<td>${esc(r.summary || '')}</td>`;
      html += `<td>${esc(r.resolution)}</td>`;
      html += `<td><code style="font-size:11px;">${esc(r.label)}</code></td>`;
      html += `<td>${esc(r.reason)}</td>`;
      html += `</tr>`;
    });
    html += `</tbody></table>`;
  }
  html += `</div>`;

  // === All Closed sub-tab ===
  html += `<div class="subtab-content" id="subtab-history-all">`;
  if (!recentlyClosed.length) {
    html += `<p style="color:#9ca3af;margin:24px 0;">No closed tickets found in the last 3 months.</p>`;
  } else {
    // Collect unique types and categories for filters
    const closedTypes = [...new Set(recentlyClosed.map(t => t.type).filter(Boolean))].sort();
    const closedCategories = [...new Set(recentlyClosed.map(t => t.close_category || 'Other'))].sort();

    html += `<div style="margin:8px 0 12px;color:#9ca3af;">All tickets closed in the last 3 months (~90 days), sorted by resolution date (most recent first).</div>`;
    html += `<div class="filter-bar" style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;">`;
    html += `<input type="text" id="all-closed-filter" placeholder="Filter by key, summary, or closed by..." oninput="filterAllClosedTable()">`;
    html += `<select id="all-closed-type-filter" onchange="filterAllClosedTable()" style="background:#1e293b;color:#e5e7eb;border:1px solid #374151;border-radius:4px;padding:6px 10px;font-size:13px;">`;
    html += `<option value="">All Types</option>`;
    closedTypes.forEach(type => { html += `<option value="${esc(type)}">${esc(type)}</option>`; });
    html += `</select>`;
    html += `<select id="all-closed-category-filter" onchange="filterAllClosedTable()" style="background:#1e293b;color:#e5e7eb;border:1px solid #374151;border-radius:4px;padding:6px 10px;font-size:13px;">`;
    html += `<option value="">All Categories</option>`;
    closedCategories.forEach(cat => { html += `<option value="${esc(cat)}">${esc(cat)}</option>`; });
    html += `</select>`;
    html += `</div>`;
    html += `<table id="all-closed-table"><thead><tr>`;
    ['Closed','Key','Summary','Type','Reporter','Closed By','Category','Resolution','Priority','Created'].forEach(h => {
      const infoBtn = h === 'Category' ? `<span class="info-btn" data-info="category-info">?</span>` : '';
      html += `<th>${h}${infoBtn}<span class="sort-indicator">\u21C5</span><div class="resize-handle"></div></th>`;
    });
    html += `</tr></thead><tbody>`;

    const sorted = recentlyClosed.slice().sort((a, b) => {
      const da = a.updated || a.created || '';
      const db = b.updated || b.created || '';
      return db.localeCompare(da);
    });

    sorted.forEach(t => {
      const closedDate = (t.updated || '').slice(0, 10);
      const category = t.close_category || 'Other';
      const categoryColor = category === 'Triage' ? '#22c55e' : category.startsWith('Lifecycle') ? '#60a5fa' : '#64748b';
      const reporter = (t.reporter_email || '').split('@')[0] || t.reporter_name || '';
      html += `<tr data-type="${esc(t.type)}" data-category="${esc(category)}">`;
      html += `<td class="nowrap">${closedDate}</td>`;
      html += `<td class="nowrap">${jiraLink(t.key)}</td>`;
      html += `<td>${esc(t.summary)}</td>`;
      html += `<td>${esc(t.type)}</td>`;
      html += `<td>${esc(reporter)}</td>`;
      html += `<td>${esc(t.closed_by || '')}</td>`;
      html += `<td style="color:${categoryColor};font-weight:600;">${category}</td>`;
      html += `<td>${esc(t.resolution || '')}</td>`;
      html += `<td>${esc(t.priority)}</td>`;
      html += `<td class="nowrap">${(t.created || '').slice(0, 10)}</td>`;
      html += `</tr>`;
    });
    html += `</tbody></table>`;
  }
  html += `</div>`;

  html += `</div>`;
  return html;
}

function getWeekStart(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  const monday = new Date(d.setDate(diff));
  return monday.toISOString().slice(0, 10);
}

function toggleGeneratedRows(tableId, show) {
  const table = document.getElementById(tableId);
  if (!table) return;
  table.querySelectorAll('tr[data-generated="yes"]').forEach(row => {
    row.style.display = show ? '' : 'none';
  });
}

function filterOrphanTable() {
  const q = (document.getElementById('cleanup-filter')?.value || '').toLowerCase();
  document.querySelectorAll('.orphan-parent-row').forEach(row => {
    const text = row.textContent.toLowerCase();
    const match = text.includes(q);
    row.style.display = match ? '' : 'none';
    row.nextElementSibling.style.display = match && row.classList.contains('expanded') ? 'table-row' : 'none';
  });
}

// --- Tabs ---
function initTabs() {
  document.querySelectorAll('.tab-bar').forEach(bar => {
    bar.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        // Main tabs
        if (tab.dataset.tab) {
          bar.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
          document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
          tab.classList.add('active');
          document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
          initAllTables();
        }
        // Sub-tabs (within duplicates)
        if (tab.dataset.subtab) {
          bar.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
          const parent = bar.parentElement;
          parent.querySelectorAll('.subtab-content').forEach(sc => sc.classList.remove('active'));
          tab.classList.add('active');
          parent.querySelector('#subtab-' + tab.dataset.subtab).classList.add('active');
          initAllTables();
        }
      });
    });
  });
}

// --- Sorting ---
function initAllTables() {
  document.querySelectorAll('table').forEach(table => {
    const headers = table.querySelectorAll('th');
    headers.forEach((th, colIdx) => {
      th.addEventListener('click', (e) => {
        if (e.target.classList.contains('resize-handle')) return;
        if (e.target.closest('.info-btn, .info-btn-lg')) return;
        sortTable(table, colIdx, th);
      });
      // Resize handles
      const handle = th.querySelector('.resize-handle');
      if (handle) initResize(th, handle);
    });
  });
}

function sortTable(table, colIdx, th) {
  const tbody = table.querySelector('tbody');
  if (!tbody) return;
  const isAsc = th.classList.contains('sorted-asc');

  table.querySelectorAll('th').forEach(h => {
    h.classList.remove('sorted', 'sorted-asc', 'sorted-desc');
    const ind = h.querySelector('.sort-indicator');
    if (ind) ind.textContent = '\u21C5';
  });

  // Group parent+detail row pairs for tables with expandable rows
  const allRows = Array.from(tbody.querySelectorAll('tr'));
  const hasDetailRows = allRows.some(r => r.classList.contains('orphan-detail-row'));
  let rows;
  let pairMap = new Map();
  if (hasDetailRows) {
    rows = allRows.filter(r => r.classList.contains('orphan-parent-row'));
    rows.forEach(r => {
      const next = r.nextElementSibling;
      if (next && next.classList.contains('orphan-detail-row')) pairMap.set(r, next);
    });
  } else {
    rows = allRows;
  }

  const dateRe = /^\d{4}-\d{2}-\d{2}/;
  rows.sort((a, b) => {
    let aVal = a.cells[colIdx]?.textContent.trim() || '';
    let bVal = b.cells[colIdx]?.textContent.trim() || '';
    const aDate = aVal.match(dateRe);
    const bDate = bVal.match(dateRe);
    if (aDate && bDate) {
      return isAsc ? bDate[0].localeCompare(aDate[0]) : aDate[0].localeCompare(bDate[0]);
    }
    const aNum = parseFloat(aVal);
    const bNum = parseFloat(bVal);
    if (!isNaN(aNum) && !isNaN(bNum)) {
      return isAsc ? bNum - aNum : aNum - bNum;
    }
    return isAsc ? bVal.localeCompare(aVal) : aVal.localeCompare(bVal);
  });

  if (hasDetailRows) {
    rows.forEach(r => {
      tbody.appendChild(r);
      const detail = pairMap.get(r);
      if (detail) tbody.appendChild(detail);
    });
  } else {
    rows.forEach(r => tbody.appendChild(r));
  }
  th.classList.add('sorted', isAsc ? 'sorted-desc' : 'sorted-asc');
  const ind = th.querySelector('.sort-indicator');
  if (ind) ind.textContent = isAsc ? '\u25BC' : '\u25B2';
}

// --- Column Resize ---
function initResize(th, handle) {
  let startX, startWidth;
  handle.addEventListener('mousedown', (e) => {
    e.preventDefault();
    startX = e.pageX;
    startWidth = th.offsetWidth;
    handle.classList.add('active');
    const onMove = (ev) => { th.style.width = (startWidth + ev.pageX - startX) + 'px'; th.style.minWidth = th.style.width; };
    const onUp = () => { handle.classList.remove('active'); document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
}

// --- Filtering ---
function filterTable(tableId, inputId) {
  const table = document.getElementById(tableId);
  if (!table) return;
  const input = document.getElementById(inputId);
  const query = (input?.value || '').toLowerCase();

  // Type filter (priorities)
  const typeFilter = document.getElementById('priority-type-filter');
  const typeVal = typeFilter ? typeFilter.value : '';
  // Label filter (priorities)
  const labelFilter = document.getElementById('priority-label-filter');
  const labelVal = labelFilter ? labelFilter.value : '';
  // Duplicate type filter (check both sub-tab filters)
  const dupIssuesTypeFilter = document.getElementById('dup-issues-type-filter');
  const dupGenTypeFilter = document.getElementById('dup-gen-type-filter');
  const dupTypeVal = (dupIssuesTypeFilter && table.id === 'dup-issues-table') ? dupIssuesTypeFilter.value
    : (dupGenTypeFilter && table.id === 'dup-gen-table') ? dupGenTypeFilter.value : '';

  const rows = table.querySelectorAll('tbody tr');
  rows.forEach(row => {
    const text = row.textContent.toLowerCase();
    let visible = !query || text.includes(query);

    if (visible && typeVal && row.dataset.type) {
      visible = row.dataset.type === typeVal;
    }
    if (visible && labelVal && row.dataset.label) {
      visible = row.dataset.label === labelVal;
    }
    if (visible && dupTypeVal) {
      if (dupTypeVal === 'same-parent') {
        visible = row.dataset.sameParent === 'yes';
      }
    }

    row.style.display = visible ? '' : 'none';
  });
}

function filterAllClosedTable() {
  const table = document.getElementById('all-closed-table');
  if (!table) return;
  const query = (document.getElementById('all-closed-filter')?.value || '').toLowerCase();
  const typeVal = document.getElementById('all-closed-type-filter')?.value || '';
  const catVal = document.getElementById('all-closed-category-filter')?.value || '';

  table.querySelectorAll('tbody tr').forEach(row => {
    const text = row.textContent.toLowerCase();
    let visible = !query || text.includes(query);
    if (visible && typeVal) visible = (row.dataset.type || '') === typeVal;
    if (visible && catVal) visible = (row.dataset.category || '') === catVal;
    row.style.display = visible ? '' : 'none';
  });
}

  'main-overview': `<h4>About This Report</h4>
<p>The goal is twofold: <strong>surface the tickets that deserve attention</strong>, and <strong>systematically close the ones that no longer do</strong>.</p>

<ul style="margin:6px 0 0 16px;">

<h5>How to Use This Report</h5>
<ul style="margin:6px 0 0 16px;">

<h5>Technical Details</h5>
<ul style="margin:6px 0 0 16px;">

<li><strong>Priority scoring</strong> \u2014 Weighted formula across 10+ signals, normalized to 0\u2013100</li>
<li><strong>Duplicate detection</strong> \u2014 Groups generated children by parent and flags duplicate summaries</li>
<li><strong>Pipeline</strong> \u2014 6 Python scripts run sequentially: fetch \u2192 detect duplicates \u2192 score priorities \u2192 report \u2192 build data \u2192 build standalone</li>

<p style="margin-top:10px;color:#9ca3af;font-size:0.85em;">Source: <a href="https://github.com/dtaylor113/backlog-triage" style="color:#60a5fa;" target="_blank">github.com/dtaylor113/backlog-triage</a></p>

<ul style="margin:6px 0 0 16px;">

<h5 style="font-size:14px;letter-spacing:1px;" id="edit-modes-title">EDIT MODES</h5>
<p>Edit modes allow you to take action on tickets directly from this report. All edit modes are secure: they generate CLI commands that you review and execute in your own authenticated terminal. No changes are made from this HTML file itself \u2014 it remains a read-only document. Every action is reversible \u2014 closures, priority changes, and freezes can all be reverted directly from this report using the corresponding revert/unfreeze controls.</p>

<h5 style="margin-left:12px;">Freezing Lifecycle Tickets</h5>
<ul style="margin:6px 0 0 28px;">

<h5 style="margin-left:12px;">Closing & Reverting Tickets</h5>
<ul style="margin:6px 0 0 28px;">
<li><strong>Close mode</strong> \u2014 Reveals checkboxes in the Duplicates and Orphaned tabs to select tickets for closure.</li>

function openInfoPopup(key) {
  let popup = document.querySelector('.info-popup');
  if (!popup) {
    popup = document.createElement('div');
    popup.className = 'info-popup';
    document.body.appendChild(popup);
  }
  const isLarge = key === 'main-overview' || key === 'admin-edit-modes';
  popup.classList.toggle('info-popup-lg', isLarge);
  popup.dataset.source = key;
  popup.innerHTML = `<span class="close-btn">\u00D7</span>${INFO_CONTENT[key] || ''}`;
  if (isLarge) {
    popup.style.top = '60px';
    popup.style.left = Math.max(20, (window.innerWidth - 850) / 2) + 'px';
  } else {
    popup.style.top = '80px';
    popup.style.left = Math.max(20, (window.innerWidth - 440) / 2) + 'px';
  }
  popup.classList.add('visible');
  popup.querySelector('.close-btn').addEventListener('click', () => popup.classList.remove('visible'));
}

document.addEventListener('click', (e) => {
  const btn = e.target.closest('.info-btn, .info-btn-lg');
  const existing = document.querySelector('.info-popup.visible');
  const insidePopup = e.target.closest('.info-popup');

  if (existing && !insidePopup && !btn) {
    existing.classList.remove('visible');
  }

  if (btn) {
    e.stopPropagation();
    if (existing) existing.classList.remove('visible');
    const key = btn.dataset.info;
    const rect = btn.getBoundingClientRect();
    openInfoPopup(key);
    const popup = document.querySelector('.info-popup');
    if (key !== 'main-overview' && key !== 'admin-edit-modes') {
      popup.style.top = (rect.bottom + 8) + 'px';
      popup.style.left = Math.min(rect.left, window.innerWidth - 440) + 'px';
    }
  }

  // Close mode checkbox handling — prevent row expand/collapse when clicking checkboxes
  if (e.target.closest('.close-cb') || e.target.closest('.close-parent-cb')) return;

  // Clickable metric cards navigation
  const navCard = e.target.closest('.card-clickable');
  if (navCard) {
    const tabId = navCard.dataset.navTab;
    const subtabId = navCard.dataset.navSubtab;
    if (tabId) {
      // Activate main tab
      document.querySelectorAll('.tab-bar:first-of-type .tab, #app > .tab-bar .tab').forEach(t => {
        if (t.dataset.tab) t.classList.remove('active');
      });
      document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
      const mainTab = document.querySelector(`.tab[data-tab="${tabId}"]`);
      if (mainTab) mainTab.classList.add('active');
      const tabContent = document.getElementById('tab-' + tabId);
      if (tabContent) tabContent.classList.add('active');

      // Activate sub-tab if specified
      if (subtabId && tabContent) {
        tabContent.querySelectorAll('.tab-bar .tab').forEach(t => t.classList.remove('active'));
        tabContent.querySelectorAll('.subtab-content').forEach(sc => sc.classList.remove('active'));
        const subTab = tabContent.querySelector(`.tab[data-subtab="${subtabId}"]`);
        if (subTab) subTab.classList.add('active');
        const subContent = tabContent.querySelector('#subtab-' + subtabId);
        if (subContent) subContent.classList.add('active');
      }

      initAllTables();
    }
  }
});
// --- Activate close/revert modes ---
let tabClickCount = 0;
let tabClickTimer = null;
let lastClickedTab = null;
document.addEventListener('click', (e) => {
  const tab = e.target.closest('.tab[data-tab]') || e.target.closest('.tab[data-subtab]');
  if (!tab) { tabClickCount = 0; lastClickedTab = null; return; }
  const tabId = tab.getAttribute('data-tab') || tab.getAttribute('data-subtab');
  if (tabId !== lastClickedTab) { tabClickCount = 0; lastClickedTab = tabId; }
  tabClickCount++;
  clearTimeout(tabClickTimer);
  tabClickTimer = setTimeout(() => { tabClickCount = 0; lastClickedTab = null; }, 1200);
  if (tabClickCount >= 3) {
    tabClickCount = 0;
    if (tabId === 'history-triage') {
      document.body.classList.toggle('revert-mode');
      updateRevertFooter();
    } else if (tabId === 'priorities') {
      document.body.classList.toggle('priority-mode');
      updatePriorityFooter();
    } else if (tabId === 'lifecycle-stale') {
      document.body.classList.toggle('freeze-mode');
      updateFreezeFooter();
    } else if (tabId === 'lifecycle-frozen') {
      document.body.classList.toggle('unfreeze-mode');
      updateFreezeFooter();
    } else if (tabId !== 'history' && tabId !== 'history-all') {
      document.body.classList.toggle('close-mode');
      const isActive = document.body.classList.contains('close-mode');
      document.querySelectorAll('#dup-table .close-col').forEach(el => {
        el.style.display = isActive ? 'inline' : 'none';
      });
      updateCloseFooter();
    }
  }
});

function toggleOrphanChildren(parentCb) {
  const row = parentCb.closest('.orphan-parent-row');
  const detail = row?.nextElementSibling;
  if (detail) {
    detail.querySelectorAll('.close-cb').forEach(c => { c.checked = parentCb.checked; });
  }

}

function syncOrphanParent(childCb) {
  const detailRow = childCb.closest('.orphan-detail-row');
  if (!detailRow) { updateCloseFooter(); return; }
  const parentRow = detailRow.previousElementSibling;
  const parentCbEl = parentRow?.querySelector('.close-parent-cb');
  if (parentCbEl) {
    const allChildren = detailRow.querySelectorAll('.close-cb');
    parentCbEl.checked = Array.from(allChildren).every(c => c.checked);
  }
  updateCloseFooter();
}

function getSelectedTickets() {
  const selected = [];
  // Duplicates
  document.querySelectorAll('#dup-table .close-cb:checked').forEach(cb => {
    const key = cb.dataset.key || '';
    const summary = cb.dataset.summary || '';
    const parent = cb.dataset.parent || '';
    selected.push({ key, summary, category: 'duplicate', resolution: 'Duplicate', label: 'triage-closed-duplicate', reason: `Duplicate under ${parent}` });
  });
  // Orphaned (children)
  document.querySelectorAll('.orphan-child-table .close-cb:checked').forEach(cb => {
    const row = cb.closest('tr');
    const key = row?.querySelector('a')?.textContent || '';
    const summary = row?.cells[2]?.textContent || '';
    const parentRow = cb.closest('.orphan-detail-row')?.previousElementSibling;
    const parentKey = parentRow?.querySelector('a')?.textContent || '';
    selected.push({ key, summary, category: 'orphan', resolution: "Won't Do", label: 'triage-closed-orphan', reason: `Parent ${parentKey} closed` });
  });
  return selected;
}

  if (freezeSelected.length) {
    listHtml += `<h4 style="color:#22d3ee;margin:8px 0 4px;">Freeze (${freezeSelected.length})</h4>`;
    listHtml += `<p style="color:#9ca3af;font-size:12px;">Adds <span class="jira-label">lifecycle-frozen</span> <span class="jira-label">triage-frozen</span></p>`;
    listHtml += `<ul class="close-modal-list">`;
    freezeSelected.forEach(s => { listHtml += `<li><strong>${s.key}</strong> — ${s.summary}</li>`; });
    listHtml += `</ul>`;
  }

  if (unfreezeSelected.length) {
    listHtml += `<h4 style="color:#f59e0b;margin:8px 0 4px;">Unfreeze (${unfreezeSelected.length})</h4>`;
    listHtml += `<p style="color:#9ca3af;font-size:12px;">Removes <span class="jira-label">lifecycle-frozen</span> <span class="jira-label">triage-frozen</span> · Adds <span class="jira-label">lifecycle-stale</span></p>`;
    listHtml += `<ul class="close-modal-list">`;
    unfreezeSelected.forEach(s => { listHtml += `<li><strong>${s.key}</strong> — ${s.summary}</li>`; });
    listHtml += `</ul>`;
  }

  modal.innerHTML = `
    <h3 style="color:#22d3ee;">Confirm Freeze / Unfreeze</h3>
    ${listHtml}
    <p style="color:#9ca3af;font-size:13px;margin-top:12px;">Click <strong>Copy CLI cmd</strong> to copy the command(s) to your clipboard, then paste into your terminal to execute.</p>
    <div class="close-modal-actions">
      <button class="modal-cancel" onclick="document.getElementById('freeze-modal-overlay').classList.remove('visible')">Close</button>
      <button class="modal-confirm" onclick="copyFreezeCommand()">Copy CLI cmd</button>
    </div>`;
  overlay.classList.add('visible');
}

function copyFreezeCommand() {
  const freezeSelected = getFreezeTickets();
  const unfreezeSelected = getUnfreezeTickets();
  const cmds = [];

  if (freezeSelected.length) {
    const manifest = { generated_at: new Date().toISOString(), items: freezeSelected.map(s => ({ key: s.key })) };
    cmds.push(`cd ~/repos/work/AI/backlog-triage && python3 scripts/freeze_tickets.py --execute --stdin <<'EOF'\n${JSON.stringify(manifest, null, 2)}\nEOF`);
  }

  if (unfreezeSelected.length) {
    const manifest = { generated_at: new Date().toISOString(), items: unfreezeSelected.map(s => ({ key: s.key })) };
    cmds.push(`cd ~/repos/work/AI/backlog-triage && python3 scripts/unfreeze_tickets.py --execute --stdin <<'EOF'\n${JSON.stringify(manifest, null, 2)}\nEOF`);
  }

  const fullCmd = cmds.join('\n\n');
  navigator.clipboard.writeText(fullCmd).then(() => {
    const btn = document.querySelector('#freeze-modal-overlay .modal-confirm');
    const original = btn.textContent;
    btn.textContent = 'Copied!';
    btn.style.background = '#22c55e';
    setTimeout(() => { btn.textContent = original; btn.style.background = ''; }, 2000);
  });
}
</script>
